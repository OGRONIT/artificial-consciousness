name: Hive Aggregator

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish accepted candidate brain"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f antahkarana_kernel/requirements.txt ]; then pip install -r antahkarana_kernel/requirements.txt; fi

      - name: Run hive aggregator
        env:
          HIVE_GITHUB_TOKEN: ${{ secrets.HIVE_BOT_TOKEN || github.token }}
          HIVE_GITHUB_REPOSITORY: ${{ github.repository }}
          HIVE_GITHUB_DISCUSSION_NUMBER: ${{ vars.HIVE_DISCUSSION_NUMBER || '1' }}
        run: |
          PUBLISH="${{ github.event.inputs.publish }}"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            PUBLISH="true"
          fi
          if [ -z "$PUBLISH" ]; then
            PUBLISH="true"
          fi
          EXTRA_FLAGS=""
          if [ "$PUBLISH" = "true" ]; then
            EXTRA_FLAGS="--publish"
          fi

          python tools/run_hive_aggregator.py \
            --repo "$HIVE_GITHUB_REPOSITORY" \
            --discussion-number "$HIVE_GITHUB_DISCUSSION_NUMBER" \
            $EXTRA_FLAGS \
            --output benchmarks/artifacts/hive_aggregator_report.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: hive-aggregator-report
          path: |
            benchmarks/artifacts/hive_aggregator_report.json
            benchmarks/artifacts/hive_aggregator_canary_result.json
          if-no-files-found: ignore

      - name: Commit accepted brain update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add trained_state/trained_state_manifest.json || true
          git add trained_state/candidate_global_brain.json || true
          git add antahkarana_kernel/evolution_vault/hive_reputation.json || true
          git add antahkarana_kernel/evolution_vault/hive_nonce_registry.json || true
          git add antahkarana_kernel/evolution_vault/hive_public_keys.json || true
          git add benchmarks/artifacts/hive_aggregator_report.json || true

          if git diff --cached --quiet; then
            echo "No accepted hive update to commit"
            exit 0
          fi

          git commit -m "chore: hive aggregator accepted candidate"
          git push
