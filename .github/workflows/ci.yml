name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f antahkarana_kernel/requirements.txt ]; then pip install -r antahkarana_kernel/requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install pytest; fi

      - name: Compile check
        run: |
          python -m compileall antahkarana_kernel
          python -m compileall .

      - name: Import smoke check
        run: |
          python - <<'PY'
          import importlib
          modules = [
              'antahkarana_kernel.AntahkaranaKernel',
              'antahkarana_kernel.InteractiveBridge',
              'antahkarana_kernel.LiveConsciousness',
          ]
          for m in modules:
              importlib.import_module(m)
          print('Smoke imports OK')
          PY

      - name: Run tests
        run: |
          python -m pytest antahkarana_kernel/tests/ -q -m "not integration"
